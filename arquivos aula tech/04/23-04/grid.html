<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grid</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <!--
    sistema de grid do BootStrap usa 6 classes para definir o número de colunas
     em diferentes tamanhos de tela:



    .col dispositovos extra pequenos - con largura de tela inferior a 576px
    .col-sm dispositivos pequenos - largura de tela superior a 576px
    .col-md dispostivios médios- largura de tela superior a 768px
    .col-lg dispositivos grandes- largura de tela superior a 992px
    .col-xl dispositivos extra grandes- largura de tela superior a 1200px
    col-xxl dispositivos extra grandes - largura de tela superior a 1400px
    -->

    <div class="container-fluid mt-3">
        <div class="row">
            <!-- row é uma classes que define uma linha dentro do sistema de grid. Ela é usada para agrupar colunas
 e garantir que elas sejam alinhadas correctamente. As colunas dentro de uma linha são 
 definas usando-->
            <div class="col-sm-3 p-3 bg-primary text-white"> col-sm</div>
            <div class="col-sm-3 p-3 bg-dark text-white"> col-sm</div>
            <div class="col-sm-3 p-3 bg-primary text-white"> col-sm</div>
            <div class="col-sm-3 p-3 bg-dark text-white"> col-sm</div>

        </div>
<br>
         <div class="row">
            <!-- row é uma classes que define uma linha dentro do sistema de grid. Ela é usada para agrupar colunas
 e garantir que elas sejam alinhadas correctamente. As colunas dentro de uma linha são 
 definas usando-->
            <div class="col-md-3 p-3 bg-primary text-white"> col-sm</div>
            <div class="col-md-3 p-3 bg-dark text-white"> col-sm</div>
            <div class="col-md-3 p-3 bg-primary text-white"> col-sm</div>
            <div class="col-md-3 p-3 bg-dark text-white"> col-sm</div>

        </div>

    </div>


</body>

</html>
